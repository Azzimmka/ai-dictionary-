<!doctype html>
<html lang="ru">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Мой словарь</title>
  {% load static %}
  <link rel="icon" type="image/png" href="{% static 'dictionary/logo.png' %}">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Словарь">
  <link rel="apple-touch-icon" href="{% static 'dictionary/logo.png' %}">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            gray: {
              850: '#1f2937',
              900: '#111827',
              950: '#030712'
            }
          },
          borderRadius: {
            'xl': '1rem',
            '2xl': '1.5rem',
            '3xl': '2rem',
          }
        }
      }
    }

    // Init Theme: Default Light, check LocalStorage
    if (localStorage.theme === 'dark') {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
  <style>
    /* Custom scrollbar for subtle look */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background-color: #e5e7eb;
      border-radius: 20px;
    }

    .dark ::-webkit-scrollbar-thumb {
      background-color: #374151;
    }

    .translation-details {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transform: translateY(-4px);
      transition: max-height 280ms ease, opacity 220ms ease, transform 280ms ease;
    }

    .translation-details.is-open {
      max-height: 260px;
      margin-top: 0.5rem;
      opacity: 1;
      transform: translateY(0);
    }

    .ai-quiz-button {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      color: #111827;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.98), transparent 28%),
        linear-gradient(135deg, #ffffff 0%, #f8fafc 34%, #dbeafe 68%, #f5f3ff 100%);
      box-shadow:
        0 16px 40px rgba(15, 23, 42, 0.12),
        0 0 0 1px rgba(148, 163, 184, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .dark .ai-quiz-button {
      color: white;
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.13), transparent 27%),
        linear-gradient(135deg, #020617 0%, #050505 42%, #111827 72%, #020617 100%);
      box-shadow:
        0 18px 48px rgba(0, 0, 0, 0.48),
        0 0 0 1px rgba(255, 255, 255, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);
    }

    .ai-quiz-button::before {
      content: "";
      position: absolute;
      inset: -80% -35%;
      z-index: -1;
      background:
        linear-gradient(115deg,
          transparent 35%,
          rgba(14, 165, 233, 0.04) 43%,
          rgba(255, 255, 255, 0.72) 50%,
          rgba(124, 58, 237, 0.08) 57%,
          transparent 65%);
      transform: translateX(-45%) rotate(8deg);
      animation: aiQuizShine 4.8s ease-in-out infinite;
    }

    .dark .ai-quiz-button::before {
      background:
        linear-gradient(115deg,
          transparent 35%,
          rgba(255, 255, 255, 0.08) 44%,
          rgba(255, 255, 255, 0.34) 50%,
          rgba(99, 102, 241, 0.11) 56%,
          transparent 65%);
    }

    .ai-quiz-button::after {
      content: "";
      position: absolute;
      inset: 1px;
      z-index: -2;
      border-radius: inherit;
      background:
        radial-gradient(circle at 30% 15%, rgba(255, 255, 255, 0.6), transparent 28%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.45), transparent 42%);
      opacity: 0.8;
    }

    .dark .ai-quiz-button::after {
      background:
        radial-gradient(circle at 30% 15%, rgba(255, 255, 255, 0.13), transparent 28%),
        linear-gradient(135deg, rgba(255, 255, 255, 0.08), transparent 42%);
      opacity: 0.95;
    }

    .ai-quiz-button:hover {
      transform: translateY(-1px) scale(1.01);
      box-shadow:
        0 22px 52px rgba(15, 23, 42, 0.16),
        0 0 0 1px rgba(99, 102, 241, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.95);
    }

    .dark .ai-quiz-button:hover {
      box-shadow:
        0 22px 56px rgba(0, 0, 0, 0.58),
        0 0 0 1px rgba(255, 255, 255, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.16);
    }

    .ai-quiz-button:active {
      transform: translateY(1px) scale(0.985);
      box-shadow:
        0 8px 22px rgba(15, 23, 42, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.75);
    }

    .dark .ai-quiz-button:active {
      box-shadow:
        0 8px 24px rgba(0, 0, 0, 0.42),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    @keyframes aiQuizShine {
      0%, 62% {
        transform: translateX(-55%) rotate(8deg);
      }
      100% {
        transform: translateX(55%) rotate(8deg);
      }
    }

    .modal-panel {
      max-height: calc(100dvh - 1rem);
      padding-bottom: calc(1.5rem + env(safe-area-inset-bottom));
      overflow-y: auto;
    }

    .modal-actions {
      margin-bottom: max(0.25rem, env(safe-area-inset-bottom));
    }

    @media (min-width: 640px) {
      .modal-panel {
        max-height: calc(100dvh - 3rem);
        padding-bottom: 2rem;
      }

      .modal-actions {
        margin-bottom: 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .translation-details,
      .ai-quiz-button,
      .ai-quiz-button::before {
        animation: none;
        transition: none;
      }
    }
  </style>
</head>

<body
  class="min-h-screen bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 transition-colors duration-300 font-sans"
  id="rootBody">

  <div class="max-w-4xl mx-auto px-4 py-8 sm:py-12">
    <!-- Header -->
    <header class="mb-10 flex flex-row sm:flex-row items-center justify-between gap-6">
      <div class="flex items-center gap-4">
        <div>
          <h1 class="text-2xl font-bold tracking-tight">Мой словарь</h1>
          {% if user.is_authenticated %}
          <div class="flex items-center gap-2 text-xs text-gray-500 font-medium mt-1">
            <a href="{% url 'profile' %}" class="hover:text-gray-900 dark:hover:text-white transition-colors">{{ user.username }}</a>
            <span class="w-1 h-1 rounded-full bg-gray-300"></span>
            <form action="{% url 'logout' %}" method="post" class="inline">
              {% csrf_token %}
              <button type="submit" class="text-red-400 hover:text-red-300   transition-colors">Выйти</button>
            </form>
          </div>
          {% endif %}
        </div>
      </div>

      <div class="flex items-center gap-3">
        <a href="{% url 'profile' %}"
          class="h-10 px-3 sm:px-4 rounded-2xl bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 flex items-center justify-center gap-2 text-gray-700 dark:text-gray-200 transition-all shadow-sm active:scale-95 hover:bg-gray-50 dark:hover:bg-gray-800"
          title="Профиль" aria-label="Профиль">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20 21a8 8 0 0 0-16 0"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <span class="hidden sm:inline text-xs font-black uppercase tracking-wide">Профиль</span>
        </a>
        <button id="darkModeBtn"
          class="h-10 w-10 rounded-2xl bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 flex items-center justify-center transition-all shadow-sm active:scale-95">
          <img src="{% static 'dictionary/moon.svg' %}" class="w-5 h-5 dark:hidden" alt="Dark">
          <img src="{% static 'dictionary/icons8-sun.svg' %}" class="w-8 h-8 hidden dark:block"
            style="filter: invert(1);" alt="Light">
        </button>
      </div>
    </header>

    <!-- Toolbar / Input Section -->
    <section
      class="bg-white dark:bg-gray-900 rounded-3xl shadow-xl shadow-gray-200/50 dark:shadow-none border border-white dark:border-gray-800 p-6 sm:p-8 mb-8 relative z-10">

      <!-- Top controls -->
      <div class="flex flex-row justify-between items-center mb-8 gap-4">
        <div class="relative w-full sm:w-auto" id="customCategoryDropdown">
          <button id="categoryTrigger"
            class="flex items-center justify-between w-full sm:w-56 bg-gray-50 dark:bg-gray-800 rounded-2xl py-3 pl-5 pr-4 font-medium text-gray-700 dark:text-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-900 dark:focus:ring-gray-600 transition-all active:scale-95">
            <span id="categoryLabel" class="truncate">Все слова</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
              stroke-linecap="round" stroke-linejoin="round" class="ml-3 text-gray-400">
              <path d="M6 9l6 6 6-6" />
            </svg>
          </button>

          <div id="categoryList"
            class="hidden absolute top-full left-0 mt-2 w-full bg-white dark:bg-gray-900 rounded-2xl shadow-2xl border border-gray-100 dark:border-gray-800 z-50 overflow-hidden max-h-64 overflow-y-auto">
            <!-- Options injected here -->
          </div>
        </div>

        <div class="flex gap-2">
          <!-- Toggle Form -->
          <button id="toggleFormBtn"
            class="flex items-center justify-center w-10 h-10 rounded-2xl bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 transition-colors"
            title="Свернуть/Развернуть форму">
            <svg id="toggleIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <!-- Default Up (Collapse) -->
              <polyline points="18 15 12 9 6 15"></polyline>
            </svg>
          </button>

          <button id="addCategoryBtn"
            class="flex items-center justify-center w-10 h-10 rounded-2xl bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 transition-colors"
            title="Добавить категорию">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
          <button id="deleteCategoryBtn"
            class="flex items-center justify-center w-10 h-10 rounded-2xl bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 transition-colors"
            title="Удалить категорию">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 6h18"></path>
              <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
              <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
            </svg>
          </button>
        </div>
      </div>

      <!-- Main Input Form -->
      <form id="entryForm" class="space-y-5 relative">

        <!-- AI Toggle Widget -->
        <div class="absolute -top-0 right-0 z-10 flex items-center gap-2" title="Auto-fill with AI">
          <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">AI Mode</span>
          <button type="button" id="aiToggleBtn"
            class="w-10 h-6 bg-gray-200 dark:bg-gray-700 rounded-full relative transition-colors duration-300 focus:outline-none cursor-pointer">
            <span id="aiToggleCircle"
              class="absolute top-1 left-1 w-4 h-4 bg-white rounded-full transition-transform duration-300 shadow-sm"></span>
          </button>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-12 gap-5 pt-1">
          <div class="sm:col-span-5 space-y-2">
            <label class="text-xs font-bold text-gray-400 uppercase tracking-wider ml-1">Слово</label>
            <div class="relative">
              <input id="wordInput" type="text" placeholder="Word"
                class="w-full bg-gray-50 dark:bg-gray-800 border-none rounded-2xl px-5 py-4 pr-10 text-lg font-medium placeholder-gray-400 focus:ring-2 focus:ring-gray-900 dark:focus:ring-gray-600 outline-none transition-shadow"
                required autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"
                aria-autocomplete="list" aria-expanded="false" aria-controls="wordSuggestions">

              <!-- Simple AI Loader -->
              <div id="aiLoading" class="hidden absolute right-3 top-1/2 -translate-y-1/2">
                <div class="animate-spin rounded-full h-4 w-4 border-2 border-indigo-500 border-t-transparent"></div>
              </div>

              <div id="wordSuggestions" role="listbox"
                class="hidden absolute top-full left-0 right-0 mt-2 overflow-hidden rounded-2xl border border-gray-100 dark:border-gray-800 bg-white dark:bg-gray-900 shadow-2xl z-50 max-h-64 overflow-y-auto">
              </div>
            </div>
          </div>
          <div class="sm:col-span-7 space-y-2">
            <label class="text-xs font-bold text-gray-400 uppercase tracking-wider ml-1">Перевод</label>
            <input id="ruInput" type="text" placeholder="Translation"
              class="w-full bg-gray-50 dark:bg-gray-800 border-none rounded-2xl px-5 py-4 text-lg font-medium placeholder-gray-400 focus:ring-2 focus:ring-gray-900 dark:focus:ring-gray-600 outline-none transition-shadow">
          </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
          <div class="space-y-2">
            <label class="text-xs font-bold text-gray-400 uppercase tracking-wider ml-1">Пример</label>
            <input id="exampleInput" type="text" placeholder="Example sentence..."
              class="w-full bg-gray-50 dark:bg-gray-800 border-none rounded-2xl px-5 py-3 text-sm placeholder-gray-400 focus:ring-2 focus:ring-gray-900 dark:focus:ring-gray-600 outline-none transition-shadow">
          </div>
          <div class="space-y-2">
            <label class="text-xs font-bold text-gray-400 uppercase tracking-wider ml-1">Часть речи</label>
            <div class="relative">
              <div class="relative w-full" id="posDropdown">
                <button type="button" id="posTrigger"
                  class="flex items-center justify-between w-full bg-gray-50 dark:bg-gray-800 rounded-2xl px-5 py-3 text-sm font-medium text-gray-700 dark:text-gray-300 focus:outline-none focus:ring-2 focus:ring-gray-900 dark:focus:ring-gray-600 transition-all active:scale-95">
                  <span id="posLabel" class="truncate text-gray-400">— Выбрать —</span>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                    stroke-linecap="round" stroke-linejoin="round" class="ml-3 text-gray-400">
                    <path d="M6 9l6 6 6-6" />
                  </svg>
                </button>

                <div id="posList"
                  class="hidden absolute top-full left-0 mt-2 w-full bg-white dark:bg-gray-900 rounded-2xl shadow-2xl border border-gray-100 dark:border-gray-800 z-50 overflow-hidden max-h-64 overflow-y-auto">
                  <!-- POS Options injected via JS -->
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="pt-4 flex items-center justify-between">
          <div class="text-xs text-gray-400 hidden sm:block">
            Press <span class="font-bold text-gray-600 dark:text-gray-300">Cmd + Enter</span> to save
          </div>
          <button type="submit"
            class="bg-gray-900 dark:bg-white text-white dark:text-gray-900 font-bold px-8 py-4 rounded-2xl hover:scale-[1.02] active:scale-[0.98] transition-all shadow-lg shadow-gray-200 dark:shadow-none w-full sm:w-auto">
            Добавить
          </button>
        </div>
      </form>

      <div class="mt-6">
        <button id="quizModeBtn" type="button"
          class="ai-quiz-button w-full rounded-2xl px-5 py-4 text-sm font-black tracking-wide transition-all duration-200">
          <span class="relative z-10">AI Quiz</span>
        </button>
      </div>
    </section>

    <!-- Search -->
    <div class="mb-8 relative">
      <input id="searchInput" type="text" placeholder="Поиск по карточкам..."
        class="w-full bg-transparent border-b-2 border-gray-200 dark:border-gray-800 px-4 py-3 text-lg focus:border-gray-900 dark:focus:border-white focus:outline-none transition-colors placeholder-gray-400">
      <div class="absolute right-4 top-4 text-gray-400">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </div>
    </div>

    <!-- Cards Columns -->
    <section class="grid grid-cols-1 md:grid-cols-2 gap-8">

      <!-- Unlearned Column -->
      <div class="flex flex-col gap-4 h-full">
        <div class="flex items-center justify-between px-2">
          <h3 class="font-bold text-gray-900 dark:text-white flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-gray-900 dark:bg-white"></span>
            Изучаю
          </h3>
          <span id="unlearnedCount"
            class="text-xs font-bold text-gray-400 bg-gray-100 dark:bg-gray-800 px-2 py-1 rounded-lg">0</span>
        </div>

        <div id="unlearnedCol"
          class="flex-1 min-h-[300px] rounded-3xl p-4 transition-all border-2 border-dashed border-gray-200 dark:border-gray-800"
          data-dropzone="unlearned">
          <!-- Cards go here -->
        </div>
        <div id="unlearnedEmpty" class="text-center py-10 text-gray-400 rounded-3xl hidden">
          Нет слов
        </div>
      </div>

      <!-- Learned Column -->
      <div class="flex flex-col gap-4 h-full">
        <div class="flex items-center justify-between px-2">
          <h3 class="font-bold text-gray-400 flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-gray-300"></span>
            Выучено
          </h3>
          <span id="learnedCount"
            class="text-xs font-bold text-gray-400 bg-gray-100 dark:bg-gray-800 px-2 py-1 rounded-lg">0</span>
        </div>

        <div id="learnedCol"
          class="flex-1 min-h-[300px] rounded-3xl p-4 transition-all border-2 border-dashed border-gray-200 dark:border-gray-800"
          data-dropzone="learned">
          <!-- Cards go here -->
        </div>
        <div id="learnedEmpty" class="text-center py-10 text-gray-400 rounded-3xl hidden">
          Пусто
        </div>
      </div>
    </section>

  </div>

  <!-- Custom Modal -->
  <div id="customModal"
    class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center pointer-events-none">
    <div class="absolute inset-0 bg-gray-900/40 backdrop-blur-sm transition-opacity opacity-0" id="modalOverlay"></div>
    <div
      class="modal-panel bg-white dark:bg-gray-900 w-full sm:w-[450px] sm:rounded-3xl rounded-t-3xl p-6 sm:p-8 shadow-2xl transform transition-all translate-y-full sm:translate-y-10 opacity-0 pointer-events-auto"
      id="modalPanel">
      <h3 id="modalTitle" class="text-2xl font-bold text-gray-900 dark:text-white mb-6">Title</h3>
      <div id="modalContent" class="space-y-4 mb-8">
        <!-- Content injected here -->
      </div>
      <div class="modal-actions flex gap-3">
        <button id="modalCancel"
          class="flex-1 py-3.5 rounded-2xl bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 font-bold hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">Отмена</button>
        <button id="modalConfirm"
          class="flex-1 py-3.5 rounded-2xl bg-gray-900 dark:bg-white text-white dark:text-gray-900 font-bold hover:bg-black dark:hover:bg-gray-200 transition-colors">ОК</button>
      </div>
    </div>
  </div>

  <!-- Card Template -->
  <template id="cardTemplate">
    <article
      class="group bg-white dark:bg-gray-900 rounded-3xl p-5 mb-4 shadow-sm border border-gray-100 dark:border-gray-800 hover:shadow-xl hover:scale-[1.01] hover:border-gray-200 dark:hover:border-gray-700 transition-all cursor-grab active:cursor-grabbing"
      draggable="true">

      <!-- Top: Content + POS -->
      <div class="flex justify-between items-start gap-3">
        <div class="space-y-3 pr-2 w-full">
          <h4 class="text-xl font-bold text-gray-900 dark:text-gray-100 break-words leading-tight" data-field="word">
          </h4>

          <div data-section="example">
            <div class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-1">Пример</div>
            <p class="text-sm text-gray-500 dark:text-gray-400 break-words italic leading-normal" data-field="example">
            </p>
          </div>
        </div>
        <span data-field="pos"
          class="hidden text-[10px] font-bold uppercase tracking-wider bg-gray-100 dark:bg-gray-800 text-gray-500 px-2 py-1 rounded-lg shrink-0 h-fit"></span>
      </div>

      <!-- Bottom: Translation + Actions -->
      <div class="mt-4 pt-3 border-t border-gray-100 dark:border-gray-800">
        <div class="flex items-start justify-between gap-3">
          <div class="min-w-0 flex-1">
            <div class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-2">Перевод</div>
            <div data-field="ruPreview"
              class="text-lg font-bold leading-snug text-gray-700 dark:text-gray-300 break-words"></div>
            <button data-field="ruMore" type="button"
              class="translationMore hidden mt-2 text-sm font-bold text-indigo-500 hover:text-indigo-600 dark:text-indigo-300 dark:hover:text-indigo-200 transition-colors">
            </button>
            <div data-field="ruExpanded" class="translation-details space-y-1.5"></div>
          </div>

          <!-- Actions Row -->
          <div class="flex flex-col gap-1 shrink-0 pt-5">
            <button class="speakBtn p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg group/btn transition-colors"
              title="Слушать">
              <img src="{% static 'dictionary/icons8-sound.svg' %}"
                class="w-5 h-5 opacity-40 group-hover/btn:opacity-100 transition-opacity dark:invert">
            </button>
            <button class="pronounceBtn p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg group/btn transition-colors"
              title="Практика произношения">
              <svg class="w-5 h-5 opacity-40 group-hover/btn:opacity-100 transition-opacity" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3a3 3 0 0 0-3 3v5a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z"></path>
                <path d="M19 10v1a7 7 0 0 1-14 0v-1"></path>
                <path d="M12 18v3"></path>
              </svg>
            </button>
            <button class="editBtn p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg group/btn transition-colors"
              title="Изменить">
              <img src="{% static 'dictionary/icons8-pencil.svg' %}"
                class="w-5 h-5 opacity-40 group-hover/btn:opacity-100 transition-opacity dark:invert">
            </button>
            <button
              class="deleteBtn p-2 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg group/btn transition-colors"
              title="Удалить">
              <img src="{% static 'dictionary/icons8-trash.svg' %}"
                class="w-5 h-5 opacity-40 group-hover/btn:opacity-100 transition-opacity dark:invert">
            </button>
          </div>
        </div>
        <button type="button"
          class="mobileMoveBtn mt-4 w-full md:hidden rounded-2xl bg-gray-100 dark:bg-gray-800 px-5 py-3.5 text-sm font-bold text-gray-800 dark:text-gray-100 transition-colors active:scale-[0.98]">
          Выучил
        </button>
      </div>
    </article>
  </template>

  <!-- Toast -->
  <div id="toast"
    class="fixed top-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white font-medium px-6 py-3 rounded-full shadow-xl opacity-0 pointer-events-none transition-all transform -translate-y-4 z-50">
  </div>

  <script>
    // --- Elements ---
    const entryForm = document.getElementById('entryForm');
    const wordInput = document.getElementById('wordInput');
    const wordSuggestions = document.getElementById('wordSuggestions');
    const exampleInput = document.getElementById('exampleInput');
    // const posSelect = document.getElementById('posSelect'); // Removed
    const ruInput = document.getElementById('ruInput');
    const quizModeBtn = document.getElementById('quizModeBtn');

    /* --- AI Logic Implementation --- */
    let isAiMode = false;
    const aiToggleBtn = document.getElementById('aiToggleBtn');
    const aiToggleCircle = document.getElementById('aiToggleCircle');
    const aiLoading = document.getElementById('aiLoading');
    const submitBtn = entryForm.querySelector('button[type="submit"]'); // Define submit button dynamically
    let aiDebounceTimer;
    let suggestionDebounceTimer;
    let suggestionAbortController = null;
    let suggestionItems = [];
    let activeSuggestionIndex = -1;
    let lockedCorrectionQuery = '';

    // Toggle Handler
    if (aiToggleBtn) {
      aiToggleBtn.addEventListener('click', () => {
        isAiMode = !isAiMode;

        const posTrigger = document.getElementById('posTrigger');
        const posList = document.getElementById('posList');

        // UI Update
        if (isAiMode) {
          // Active State
          aiToggleBtn.classList.remove('bg-gray-200', 'dark:bg-gray-700');
          aiToggleBtn.classList.add('bg-indigo-600');
          aiToggleCircle.classList.add('translate-x-4');

          // Lock fields
          ruInput.disabled = true;
          ruInput.classList.add('opacity-50', 'cursor-not-allowed');
          exampleInput.disabled = true;
          exampleInput.classList.add('opacity-50', 'cursor-not-allowed');

          // Lock POS Dropdown
          if (posTrigger) {
            posTrigger.classList.add('opacity-50', 'cursor-not-allowed', 'pointer-events-none');
            posTrigger.disabled = true;
          }
          if (posList) {
            posList.classList.add('hidden'); // Force close if open
          }

        } else {
          // Inactive State
          aiToggleBtn.classList.add('bg-gray-200', 'dark:bg-gray-700');
          aiToggleBtn.classList.remove('bg-indigo-600');
          aiToggleCircle.classList.remove('translate-x-4');

          // Unlock fields
          ruInput.disabled = false;
          ruInput.classList.remove('opacity-50', 'cursor-not-allowed');
          exampleInput.disabled = false;
          exampleInput.classList.remove('opacity-50', 'cursor-not-allowed');

          // Unlock POS Dropdown
          if (posTrigger) {
            posTrigger.classList.remove('opacity-50', 'cursor-not-allowed', 'pointer-events-none');
            posTrigger.disabled = false;
          }

          // Re-enable submit if it was stuck
          if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            submitBtn.textContent = 'Добавить';
          }
        }
      });
    }

    // Input Handler
    wordInput.addEventListener('input', (e) => {
      const text = e.target.value.trim();
      if (lockedCorrectionQuery && text !== lockedCorrectionQuery) {
        lockedCorrectionQuery = '';
      }
      updateWordSuggestions(text);

      if (!isAiMode) return;

      clearTimeout(aiDebounceTimer);

      if (text.length < 2) return;

      // Disable add button while waiting for AI
      if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
        submitBtn.textContent = 'Wait AI...';
      }

      aiDebounceTimer = setTimeout(() => {
        fetchAiData(text);
      }, 1100);
    });

    wordInput.addEventListener('keydown', (e) => {
      if (wordSuggestions.classList.contains('hidden') || !suggestionItems.length) return;

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        setActiveSuggestion((activeSuggestionIndex + 1) % suggestionItems.length);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        setActiveSuggestion((activeSuggestionIndex - 1 + suggestionItems.length) % suggestionItems.length);
      } else if (e.key === 'Enter' && activeSuggestionIndex >= 0) {
        e.preventDefault();
        applyWordSuggestion(suggestionItems[activeSuggestionIndex].word);
      } else if (e.key === 'Escape') {
        hideWordSuggestions();
      }
    });

    async function fetchAiData(word) {
      aiLoading.classList.remove('hidden');

      try {
        const response = await fetch('/api/ai-lookup/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': '{{ csrf_token }}'
          },
          body: JSON.stringify({ word: word })
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          if (response.status === 422) {
            if (wordInput.value.trim() !== word) return;
            const correctionItems = (data.suggestions || [])
              .concat(data.correction ? [data.correction] : [])
              .map(item => (
                typeof item === 'string'
                  ? { word: item, source: 'fix', pos: data.pos || 'other' }
                  : { word: item.word, source: item.source || 'fix', pos: item.pos || data.pos || 'other' }
              ));
            lockedCorrectionQuery = word;
            const mergedCorrections = mergeWordSuggestions(word, correctionItems);
            if (mergedCorrections.length) renderWordSuggestions(mergedCorrections);
            showToast('Выбери правильное написание');
            return;
          }
          throw new Error('Network response was not ok');
        }

        if (wordInput.value.trim() !== word) return;

        if (data.error) {
          console.warn('AI Error:', data.error);
          return;
        }

        // Fill Data
        ruInput.value = data.translation || '';
        exampleInput.value = data.example || '';

        // Handle POS
        if (data.pos) {
          setPosValue(data.pos);
        }

      } catch (error) {
        console.error('AI Fetch Error:', error);
      } finally {
        aiLoading.classList.add('hidden');
        // Re-enable Add button
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
          submitBtn.textContent = 'Добавить';
        }
      }
    }

    // POS Custom Dropdown vars
    const posTrigger = document.getElementById('posTrigger');
    const posLabel = document.getElementById('posLabel');
    const posList = document.getElementById('posList');
    let selectedPosValue = '';
    const searchInput = document.getElementById('searchInput');
    const unlearnedCol = document.getElementById('unlearnedCol');
    const learnedCol = document.getElementById('learnedCol');

    // Drodown Elements
    const categoryTrigger = document.getElementById('categoryTrigger');
    const categoryLabel = document.getElementById('categoryLabel');
    const categoryList = document.getElementById('categoryList');

    // const categorySelect = document.getElementById('categorySelect'); // Removed
    const addCategoryBtn = document.getElementById('addCategoryBtn');
    const deleteCategoryBtn = document.getElementById('deleteCategoryBtn');

    let localWords = [];
    let localCategories = [];
    let selectedCategoryId = null;
    const ttsAudioCache = new Map();
    let activeAudio = null;

    // API
    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          if (cookie.substring(0, name.length + 1) === (name + '=')) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }

    async function fetchWords() {
      try {
        const response = await fetch('/api/words/');
        if (!response.ok) throw new Error();
        const data = await response.json();
        return data.words;
      } catch { return []; }
    }

    async function fetchCategories() {
      try {
        const res = await fetch('/api/categories/');
        const data = await res.json();
        return data.categories;
      } catch { return []; }
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (ch) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
      }[ch]));
    }

    function normalizeSuggestionWord(value) {
      return String(value || '').replace(/\s+/g, ' ').trim();
    }

    function normalizeSuggestionPos(value) {
      const normalized = String(value || 'other').toLowerCase().trim();
      if (['noun', 'verb', 'adj', 'adv', 'phrase', 'other'].includes(normalized)) return normalized;
      if (normalized === 'adjective') return 'adj';
      if (normalized === 'adverb') return 'adv';
      return 'other';
    }

    function getSuggestionPosLabel(pos) {
      return {
        noun: 'noun',
        verb: 'verb',
        adj: 'adj',
        adv: 'adv',
        phrase: 'phrase',
        other: 'other',
      }[normalizeSuggestionPos(pos)];
    }

    function getSuggestionPosClass(pos) {
      return {
        noun: 'bg-blue-500/15 text-blue-300 ring-1 ring-blue-400/20',
        verb: 'bg-red-500/15 text-red-300 ring-1 ring-red-400/20',
        adj: 'bg-violet-500/15 text-violet-300 ring-1 ring-violet-400/20',
        adv: 'bg-amber-500/15 text-amber-300 ring-1 ring-amber-400/20',
        phrase: 'bg-teal-500/15 text-teal-300 ring-1 ring-teal-400/20',
        other: 'bg-gray-500/15 text-gray-300 ring-1 ring-gray-400/20',
      }[normalizeSuggestionPos(pos)];
    }

    function mergeWordSuggestions(query, ...groups) {
      const normalizedQuery = query.toLowerCase();
      const seen = new Set();
      const merged = [];

      groups.flat().forEach((item) => {
        const word = normalizeSuggestionWord(item.word || item);
        const key = word.toLowerCase();
        const isCorrection = item.source === 'fix';
        if (!word || key === normalizedQuery || (!key.startsWith(normalizedQuery) && !isCorrection) || seen.has(key)) return;
        seen.add(key);
        merged.push({ word, source: item.source || 'saved', pos: normalizeSuggestionPos(item.pos) });
      });

      return merged.slice(0, 8);
    }

    function getLocalWordSuggestions(query) {
      const normalizedQuery = query.toLowerCase();
      return localWords
        .map(item => ({ word: item.word || item.term || '', pos: item.pos }))
        .filter(item => item.word)
        .filter(item => item.word.toLowerCase().startsWith(normalizedQuery))
        .map(item => ({ word: item.word, source: 'saved', pos: item.pos }));
    }

    function renderWordSuggestions(items) {
      suggestionItems = items;
      activeSuggestionIndex = -1;
      wordSuggestions.innerHTML = '';

      if (!items.length) {
        hideWordSuggestions();
        return;
      }

      items.forEach((item, index) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.dataset.suggestionIndex = index;
        button.setAttribute('role', 'option');
        button.setAttribute('aria-selected', 'false');
        button.className = 'flex w-full items-center justify-between gap-3 px-5 py-3 text-left text-sm font-bold text-gray-800 dark:text-gray-100 transition-colors hover:bg-gray-50 dark:hover:bg-gray-800';

        const word = document.createElement('span');
        word.className = 'min-w-0 truncate';
        word.textContent = item.word;

        const badges = document.createElement('span');
        badges.className = 'flex shrink-0 items-center gap-1.5';

        const pos = document.createElement('span');
        pos.className = `rounded-full px-2 py-0.5 text-[10px] font-black uppercase tracking-wide ${getSuggestionPosClass(item.pos)}`;
        pos.textContent = getSuggestionPosLabel(item.pos);

        const source = document.createElement('span');
        source.className = 'rounded-full bg-gray-100 dark:bg-gray-800 px-2 py-0.5 text-[10px] font-black uppercase tracking-wide text-gray-400';
        source.textContent = item.source === 'fix' ? 'Исправить' : (item.source === 'ai' ? 'AI' : 'Моё');

        badges.append(pos, source);
        button.append(word, badges);
        button.addEventListener('mouseenter', () => setActiveSuggestion(index));
        button.addEventListener('mousedown', (e) => e.preventDefault());
        button.addEventListener('click', () => applyWordSuggestion(item.word));
        wordSuggestions.appendChild(button);
      });

      wordSuggestions.classList.remove('hidden');
      wordInput.setAttribute('aria-expanded', 'true');
    }

    function setActiveSuggestion(index) {
      activeSuggestionIndex = index;
      wordSuggestions.querySelectorAll('[data-suggestion-index]').forEach((button, buttonIndex) => {
        const isActive = buttonIndex === activeSuggestionIndex;
        button.setAttribute('aria-selected', String(isActive));
        button.classList.toggle('bg-gray-50', isActive);
        button.classList.toggle('dark:bg-gray-800', isActive);
      });
    }

    function hideWordSuggestions() {
      suggestionItems = [];
      activeSuggestionIndex = -1;
      wordSuggestions.classList.add('hidden');
      wordInput.setAttribute('aria-expanded', 'false');
    }

    function applyWordSuggestion(word) {
      lockedCorrectionQuery = '';
      wordInput.value = word;
      hideWordSuggestions();
      clearTimeout(aiDebounceTimer);
      clearTimeout(suggestionDebounceTimer);
      if (suggestionAbortController) suggestionAbortController.abort();
      if (isAiMode) fetchAiData(word);
      wordInput.focus();
    }

    function updateWordSuggestions(query) {
      clearTimeout(suggestionDebounceTimer);
      if (suggestionAbortController) suggestionAbortController.abort();

      if (query.length < 2) {
        lockedCorrectionQuery = '';
        hideWordSuggestions();
        return;
      }

      const localSuggestions = mergeWordSuggestions(query, getLocalWordSuggestions(query));
      if (lockedCorrectionQuery !== query) {
        renderWordSuggestions(localSuggestions);
      }

      suggestionDebounceTimer = setTimeout(async () => {
        suggestionAbortController = new AbortController();
        try {
          const response = await fetch(`/api/word-suggestions/?q=${encodeURIComponent(query)}`, {
            signal: suggestionAbortController.signal,
          });
          if (!response.ok) throw new Error();
          const data = await response.json();
          const merged = mergeWordSuggestions(query, localSuggestions, data.suggestions || []);
          if (lockedCorrectionQuery === query) return;
          if (wordInput.value.trim() === query) renderWordSuggestions(merged);
        } catch (error) {
          if (lockedCorrectionQuery === query) return;
          if (error.name !== 'AbortError') renderWordSuggestions(localSuggestions);
        }
      }, 350);
    }

    function upsertLocalWord(word) {
      const index = localWords.findIndex(item => item.id === word.id);
      if (index >= 0) {
        localWords[index] = { ...localWords[index], ...word };
      } else {
        localWords.unshift(word);
      }
    }

    function splitTranslations(value) {
      return String(value || '')
        .split(/[,;\n]+/)
        .map(item => item.trim())
        .filter(Boolean);
    }

    function pluralizeMeaning(count) {
      const mod10 = count % 10;
      const mod100 = count % 100;
      if (mod10 === 1 && mod100 !== 11) return 'значение';
      if (mod10 >= 2 && mod10 <= 4 && (mod100 < 12 || mod100 > 14)) return 'значения';
      return 'значений';
    }

    function renderTranslationBlock(node, card) {
      const translation = card.translation || card.ru || '';
      const values = splitTranslations(translation);
      const preview = node.querySelector('[data-field="ruPreview"]');
      const moreBtn = node.querySelector('[data-field="ruMore"]');
      const expanded = node.querySelector('[data-field="ruExpanded"]');

      if (!values.length) {
        preview.textContent = 'Добавить перевод...';
        preview.classList.add('text-gray-400', 'dark:text-gray-500');
        moreBtn.classList.add('hidden');
        expanded.innerHTML = '';
        return;
      }

      preview.classList.remove('text-gray-400', 'dark:text-gray-500');
      preview.textContent = values.slice(0, 2).join(', ');
      expanded.innerHTML = values.slice(2).map((item, index) => `
        <div class="flex items-start gap-2 rounded-xl bg-gray-50 dark:bg-gray-800/70 px-3 py-2">
          <span class="mt-0.5 flex h-5 w-5 shrink-0 items-center justify-center rounded-full bg-indigo-50 dark:bg-indigo-500/15 text-[11px] font-black text-indigo-500 dark:text-indigo-300">${index + 3}</span>
          <span class="min-w-0 text-sm font-bold leading-snug text-gray-700 dark:text-gray-300 break-words">${escapeHtml(item)}</span>
        </div>
      `).join('');

      if (values.length <= 2) {
        moreBtn.classList.add('hidden');
        expanded.classList.remove('is-open');
        return;
      }

      const extraCount = values.length - 2;
      let isOpen = false;
      const updateButton = () => {
        moreBtn.textContent = isOpen ? 'Свернуть' : `+ ещё ${extraCount} ${pluralizeMeaning(extraCount)}`;
        moreBtn.setAttribute('aria-expanded', String(isOpen));
        expanded.classList.toggle('is-open', isOpen);
      };

      moreBtn.classList.remove('hidden');
      moreBtn.onclick = (event) => {
        event.stopPropagation();
        isOpen = !isOpen;
        updateButton();
      };
      updateButton();
    }

    function openBulkImportModal() {
      const close = showModal('Импорт слов', `
        <div class="space-y-4">
          <textarea id="bulkWordsInput" rows="8"
            class="w-full resize-none rounded-2xl bg-gray-50 dark:bg-gray-800 px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-gray-900 dark:focus:ring-gray-600"
            placeholder="apple&#10;run&#10;look up"></textarea>
          <p id="bulkImportStatus" class="text-sm text-gray-500 dark:text-gray-400">До 30 слов или фраз, по одному в строке.</p>
          <button id="bulkImportRun" type="button"
            class="w-full rounded-2xl bg-gray-900 dark:bg-white px-5 py-3.5 text-sm font-bold text-white dark:text-gray-900">Заполнить через AI</button>
        </div>
      `, null);

      document.getElementById('bulkImportRun').addEventListener('click', async () => {
        const button = document.getElementById('bulkImportRun');
        const status = document.getElementById('bulkImportStatus');
        const words = document.getElementById('bulkWordsInput').value;
        button.disabled = true;
        button.textContent = 'AI заполняет...';
        status.textContent = 'Это может занять несколько секунд.';

        try {
          const res = await fetch('/api/words/bulk-ai/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
            body: JSON.stringify({ words, category_id: selectedCategoryId })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Import failed');

          data.created.forEach(upsertLocalWord);
          renderCards(localWords);
          showToast(`Добавлено: ${data.created.length}, пропущено: ${data.skipped.length}`);
          close();
        } catch (error) {
          status.textContent = error.message || 'Не удалось импортировать слова';
          button.disabled = false;
          button.textContent = 'Попробовать еще раз';
        }
      });
    }

    async function openReviewSession() {
      const close = showModal('Повторение', '<p class="text-gray-500 dark:text-gray-400">Загружаю слова...</p>', null);
      try {
        const res = await fetch('/api/review/due/?limit=20');
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Review failed');
        const queue = data.words || [];
        let index = 0;
        let revealed = false;

        const renderReview = () => {
          if (index >= queue.length) {
            modalContent.innerHTML = `
              <div class="space-y-4">
                <p class="text-lg font-bold text-gray-900 dark:text-white">Готово на сегодня</p>
                <p class="text-gray-500 dark:text-gray-400">Ты прошел все слова, которые сейчас доступны для повторения.</p>
              </div>
            `;
            return;
          }

          const word = queue[index];
          modalContent.innerHTML = `
            <div class="space-y-5">
              <div class="text-sm text-gray-400">${index + 1} / ${queue.length}</div>
              <div class="rounded-3xl bg-gray-50 dark:bg-gray-800 p-6">
                <div class="text-3xl font-bold text-gray-900 dark:text-white">${escapeHtml(word.word)}</div>
                ${revealed ? `
                  <div class="mt-5 border-t border-gray-200 dark:border-gray-700 pt-5">
                    <div class="text-xs font-bold uppercase tracking-widest text-gray-400">Перевод</div>
                    <div class="mt-2 text-xl font-bold">${escapeHtml(word.translation)}</div>
                    <div class="mt-4 text-sm italic text-gray-500 dark:text-gray-400">${escapeHtml(word.example || '')}</div>
                  </div>
                ` : ''}
              </div>
              ${revealed ? `
                <div class="grid grid-cols-2 gap-2">
                  <button data-grade="forgot" class="reviewGrade rounded-2xl bg-red-50 px-4 py-3 font-bold text-red-600">Не помню</button>
                  <button data-grade="hard" class="reviewGrade rounded-2xl bg-amber-50 px-4 py-3 font-bold text-amber-700">Сложно</button>
                  <button data-grade="good" class="reviewGrade rounded-2xl bg-emerald-50 px-4 py-3 font-bold text-emerald-700">Знаю</button>
                  <button data-grade="easy" class="reviewGrade rounded-2xl bg-indigo-50 px-4 py-3 font-bold text-indigo-700">Легко</button>
                </div>
              ` : `
                <button id="reviewRevealBtn" class="w-full rounded-2xl bg-gray-900 dark:bg-white px-5 py-3.5 font-bold text-white dark:text-gray-900">Показать ответ</button>
              `}
            </div>
          `;

          const revealBtn = document.getElementById('reviewRevealBtn');
          if (revealBtn) {
            revealBtn.addEventListener('click', () => {
              revealed = true;
              renderReview();
            });
          }
          modalContent.querySelectorAll('.reviewGrade').forEach(btn => {
            btn.addEventListener('click', async () => {
              const word = queue[index];
              const grade = btn.dataset.grade;
              const answer = await fetch(`/api/review/${word.id}/answer/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
                body: JSON.stringify({ grade })
              });
              const updated = await answer.json();
              if (answer.ok && updated.word) upsertLocalWord(updated.word);
              index += 1;
              revealed = false;
              renderCards(localWords);
              renderReview();
            });
          });
        };

        renderReview();
      } catch (error) {
        modalContent.innerHTML = `<p class="text-red-500">${escapeHtml(error.message || 'Не удалось открыть повторение')}</p>`;
      }
    }

    async function openQuizSession() {
      showModal('AI Quiz', '', null);
      let quizCount = 6;
      let quizDifficulty = 'medium';

      const difficultyLabels = {
        easy: 'Easy',
        medium: 'Medium',
        hard: 'Hard',
      };

      const renderQuizSetup = () => {
        modalContent.innerHTML = `
          <div class="space-y-5">
            <div class="rounded-3xl bg-gray-50 dark:bg-gray-800 p-5">
              <div class="text-xs font-black uppercase tracking-widest text-gray-400">Настрой quiz</div>

                  <span class="text-gray-400">${index + 1} / ${questions.length}</span>

                    <div class="mt-1 text-xs text-gray-500 dark:text-gray-400">${escapeHtml(item.word || '')}</div>

                <div class="mt-4 grid grid-cols-1 sm:grid-cols-2 gap-2 text-sm">

                    <div class="mt-1 font-bold text-gray-800 dark:text-gray-100">${escapeHtml(item.answer || '—')}</div>
                  </div>
                  <div class="rounded-xl bg-white/70 dark:bg-gray-900/50 px-3 py-2">
                    <div class="text-[10px] font-black uppercase tracking-widest text-gray-400">Правильный ответ</div>

    function openPronunciationModal(card) {
      const close = showModal('Произношение', `
        <div class="space-y-4">
          <div class="rounded-3xl bg-gray-50 dark:bg-gray-800 p-5">
            <div class="text-xs font-bold uppercase tracking-widest text-gray-400">Слово</div>
            <div id="pronunciationTarget" class="mt-2 text-3xl font-bold tracking-tight">${escapeHtml(card.word)}</div>
          </div>
          <div class="rounded-2xl bg-gray-50 dark:bg-gray-800 px-4 py-3">
            <div class="text-xs font-bold uppercase tracking-widest text-gray-400">Распознано</div>
            <div id="pronunciationLiveText" class="mt-1 min-h-7 text-lg font-bold text-gray-400">—</div>
          </div>
          <p id="pronunciationStatus" class="text-sm text-gray-500 dark:text-gray-400">Сначала можно послушать слово. Потом нажми запись и произнеси его — проверка начнется автоматически.</p>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
            <button id="pronunciationListen" class="rounded-2xl bg-gray-100 dark:bg-gray-800 px-5 py-3.5 font-bold text-gray-700 dark:text-gray-200">Прослушать</button>
            <button id="pronunciationStart" class="rounded-2xl bg-gray-900 dark:bg-white px-5 py-3.5 font-bold text-white dark:text-gray-900">Записать</button>
          </div>
        </div>
      `, null);

      let recorder = null;
      let chunks = [];
      let recognition = null;
      let stream = null;
      let autoStopTimer = null;
      let maxRecordTimer = null;
      let finished = false;
      let cancelled = false;
      let latestSpeechTranscript = '';
      const status = document.getElementById('pronunciationStatus');
      const startBtn = document.getElementById('pronunciationStart');
      const listenBtn = document.getElementById('pronunciationListen');
      const targetEl = document.getElementById('pronunciationTarget');
      const liveTextEl = document.getElementById('pronunciationLiveText');
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      const cleanupTimers = () => {
        if (autoStopTimer) clearTimeout(autoStopTimer);
        if (maxRecordTimer) clearTimeout(maxRecordTimer);
        autoStopTimer = null;
        maxRecordTimer = null;
      };

      const stopRecording = (shouldSubmit = true) => {
        if (finished) return;
        finished = true;
        if (!shouldSubmit) cancelled = true;
        cleanupTimers();
        if (recognition) {
          try { recognition.onend = null; recognition.stop(); } catch { }
        }
        if (recorder && recorder.state !== 'inactive') {
          recorder.stop();
        } else if (stream) {
          stream.getTracks().forEach(track => track.stop());
        }
      };

      const normalizedChars = (value) => String(value || '').toLowerCase().replace(/[^a-z0-9]/g, '');

      const renderLiveMatch = (spokenText) => {
        const target = String(card.word || '');
        const targetNorm = normalizedChars(target);
        const spokenNorm = normalizedChars(spokenText);
        let matchedCount = 0;
        while (
          matchedCount < targetNorm.length &&
          matchedCount < spokenNorm.length &&
          targetNorm[matchedCount] === spokenNorm[matchedCount]
        ) {
          matchedCount += 1;
        }
        const hasMismatch = spokenNorm.length > matchedCount;
        let normIndex = 0;
        targetEl.innerHTML = [...target].map((char) => {
          if (!/[a-z0-9]/i.test(char)) return escapeHtml(char);
          const className = normIndex < matchedCount
            ? 'text-emerald-500'
            : (hasMismatch || spokenNorm.length >= targetNorm.length ? 'text-red-500' : 'text-gray-900 dark:text-white');
          normIndex += 1;
          return `<span class="${className}">${escapeHtml(char)}</span>`;
        }).join('');
        liveTextEl.textContent = spokenText || '—';
        liveTextEl.classList.toggle('text-red-500', hasMismatch);
        liveTextEl.classList.toggle('text-emerald-600', !!spokenText && !hasMismatch);
      };

      listenBtn.addEventListener('click', () => speakWithGroqVoice(card.word, listenBtn));

      startBtn.addEventListener('click', async () => {
        try {
          stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          chunks = [];
          finished = false;
          cancelled = false;
          latestSpeechTranscript = '';
          renderLiveMatch('');
          recorder = new MediaRecorder(stream);
          recorder.ondataavailable = (event) => {
            if (event.data.size > 0) chunks.push(event.data);
          };
          recorder.onstop = async () => {
            stream.getTracks().forEach(track => track.stop());
            if (cancelled) return;
            startBtn.disabled = false;
            startBtn.textContent = 'Записать еще раз';
            const blob = new Blob(chunks, { type: recorder.mimeType || 'audio/webm' });
            const form = new FormData();
            form.append('word_id', card.id);
            form.append('browser_transcript', latestSpeechTranscript);
            form.append('audio', blob, 'speech.webm');
            status.textContent = 'Проверяю произношение...';

            try {
              const res = await fetch('/api/pronunciation/check/', {
                method: 'POST',
                headers: { 'X-CSRFToken': getCookie('csrftoken') },
                body: form
              });
              const data = await res.json();
              if (!res.ok) throw new Error(data.error || 'Pronunciation check failed');
              if (data.status === 'no_speech') {
                renderLiveMatch('');
              } else {
                renderLiveMatch(data.transcript || '');
              }
              status.innerHTML = `<span class="font-bold">${escapeHtml(data.feedback)}</span><br><span class="text-xs">Распознано: ${escapeHtml(data.transcript || '—')}</span>`;
            } catch (error) {
              status.textContent = error.message || 'Не удалось проверить произношение';
            }
          };
          recorder.start();
          startBtn.disabled = true;
          startBtn.textContent = 'Слушаю...';
          status.textContent = SpeechRecognition
            ? 'Говори сейчас. Я остановлю запись автоматически после паузы.'
            : 'Говори сейчас. Live-распознавание недоступно, запись остановится автоматически.';

          if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = true;
            recognition.continuous = false;
            recognition.onresult = (event) => {
              const transcript = Array.from(event.results)
                .map(result => result[0]?.transcript || '')
                .join(' ')
                .trim();
              latestSpeechTranscript = transcript;
              renderLiveMatch(transcript);
              if (autoStopTimer) clearTimeout(autoStopTimer);
              autoStopTimer = setTimeout(stopRecording, 1200);
            };
            recognition.onerror = () => {
              status.textContent = 'Live-распознавание не сработало, но аудио все равно проверится.';
            };
            recognition.onend = () => {
              if (latestSpeechTranscript) {
                autoStopTimer = setTimeout(stopRecording, 500);
              }
            };
            recognition.start();
          }

          maxRecordTimer = setTimeout(stopRecording, SpeechRecognition ? 6500 : 4500);
        } catch {
          status.textContent = 'Браузер не дал доступ к микрофону.';
          startBtn.disabled = false;
          startBtn.textContent = 'Записать';
        }
      });

      modalCancel.onclick = () => {
        stopRecording(false);
        close();
      };
    }

    function speakWithBrowserVoice(text) {
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'en-US';
      window.speechSynthesis.speak(utter);
    }

    async function speakWithGroqVoice(text, button) {
      const normalized = String(text || '').trim();
      if (!normalized) return;

      const cacheKey = normalized.toLowerCase();
      const originalOpacity = button.style.opacity;
      button.style.opacity = '0.45';
      button.disabled = true;

      try {
        let audioUrl = ttsAudioCache.get(cacheKey);
        if (!audioUrl) {
          const response = await fetch('/api/tts/', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify({ text: normalized })
          });

          if (!response.ok) throw new Error('TTS request failed');

          const audioBlob = await response.blob();
          audioUrl = URL.createObjectURL(audioBlob);
          ttsAudioCache.set(cacheKey, audioUrl);
        }

        if (activeAudio) {
          activeAudio.pause();
          activeAudio.currentTime = 0;
        }

        activeAudio = new Audio(audioUrl);
        await activeAudio.play();
      } catch (error) {
        console.warn('Groq TTS failed, using browser voice:', error);
        speakWithBrowserVoice(normalized);
      } finally {
        button.disabled = false;
        button.style.opacity = originalOpacity;
      }
    }
