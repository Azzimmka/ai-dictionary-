    // --- POS Dropdown Logic ---
    const posOptions = [
      { val: '', label: '— Выбрать —' },
      { val: 'noun', label: 'Существительное' },
      { val: 'verb', label: 'Глагол' },
      { val: 'adj', label: 'Прилагательное' },
      { val: 'adv', label: 'Наречие' },
      { val: 'phrase', label: 'Фраза' },
      { val: 'other', label: 'Другое' },
    ];

    function normalizePosValue(value) {
      const aliases = {
        noun: 'noun',
        verb: 'verb',
        adj: 'adj',
        adjective: 'adj',
        adv: 'adv',
        adverb: 'adv',
        phrase: 'phrase',
        expression: 'phrase',
        'phrasal verb': 'phrase',
        other: 'other',
        interjection: 'other',
      };
      return aliases[String(value || '').toLowerCase().trim()] || 'other';
    }

    function setPosValue(value) {
      const normalized = normalizePosValue(value);
      const option = posOptions.find(opt => opt.val === normalized) || posOptions.find(opt => opt.val === 'other');
      selectedPosValue = option.val;
      posLabel.textContent = option.label;
      posLabel.classList.toggle('text-gray-400', !option.val);
      posLabel.classList.toggle('text-gray-700', !!option.val);
      posLabel.classList.toggle('dark:text-gray-300', !!option.val);
      renderPosOptions();
    }

    function renderPosOptions() {
      posList.innerHTML = '';
      posOptions.forEach(opt => {
        const div = document.createElement('div');
        const isSelected = (opt.val === selectedPosValue);
        div.className = `px-5 py-3 cursor-pointer transition-colors flex items-center justify-between group ${isSelected ? 'bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-white font-bold' : 'text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800'}`;
        div.innerHTML = `<span>${opt.label}</span>${isSelected ? '<span class="text-blue-500">✓</span>' : ''}`;
        div.onclick = (e) => {
          e.stopPropagation();
          selectedPosValue = opt.val;
          posLabel.textContent = opt.label;
          posLabel.classList.toggle('text-gray-400', !opt.val);
          posList.classList.add('hidden');
          renderPosOptions();
        };
        posList.appendChild(div);
      });
    }

    // Init POS items
    renderPosOptions();

    // Toggle POS
    posTrigger.addEventListener('click', (e) => {
      e.stopPropagation();
      posList.classList.toggle('hidden');
      // Close other dropdown if open
      categoryList.classList.add('hidden');
    });

    // Close Dropdowns Outside (Updated to include POS)
    document.addEventListener('click', (e) => {
      if (!categoryTrigger.contains(e.target) && !categoryList.contains(e.target)) {
        categoryList.classList.add('hidden');
      }
      if (!posTrigger.contains(e.target) && !posList.contains(e.target)) {
        posList.classList.add('hidden');
      }
    });

    function updateCounters(items) {
      const total = items.length;
      const learned = items.filter(i => i.is_learned || i.learned).length; // Handle both DB field names consistency
      const unlearned = total - learned;
      document.getElementById('unlearnedCount').textContent = unlearned;
      document.getElementById('learnedCount').textContent = learned;
    }

    function renderCards(wordsList) {
      const query = searchInput.value.trim().toLowerCase();
      unlearnedCol.innerHTML = '';
      learnedCol.innerHTML = '';

      const filtered = wordsList.filter(i => {
        if (selectedCategoryId && i.category_id != selectedCategoryId) return false;
        if (!query) return true;
        return (
          (i.word || '').toLowerCase().includes(query) ||
          (i.translation || i.ru || '').toLowerCase().includes(query)
        );
      });

      updateCounters(filtered);

      const tpl = document.getElementById('cardTemplate');

      // Toggle empty states
      document.getElementById('unlearnedEmpty').classList.toggle('hidden', filtered.some(i => !(i.learned || i.is_learned)));
      document.getElementById('learnedEmpty').classList.toggle('hidden', filtered.some(i => (i.learned || i.is_learned)));

      filtered.forEach(card => {
        const node = tpl.content.firstElementChild.cloneNode(true);
        node.dataset.id = card.id;

        // Populate fields
        // Populate fields
        node.querySelector('[data-field="word"]').textContent = card.word;

        const exSection = node.querySelector('[data-section="example"]');
        if (card.example) {
          exSection.classList.remove('hidden');
          node.querySelector('[data-field="example"]').textContent = card.example;
        } else {
          exSection.classList.add('hidden');
        }
        renderTranslationBlock(node, card);

        // POS badge
        if (card.pos && card.pos !== 'other') {
          const badge = node.querySelector('[data-field="pos"]');
          badge.textContent = card.pos;
          badge.classList.remove('hidden');
        }
        const isLearned = card.learned || card.is_learned;

        // --- Logic ---

        // Speech
        const speakBtn = node.querySelector('.speakBtn');
        speakBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          speakWithGroqVoice(card.word, speakBtn);
        });

        node.querySelector('.pronounceBtn').addEventListener('click', (e) => {
          e.stopPropagation();
          openPronunciationModal(card);
        });

        // Edit Modal
        node.querySelector('.editBtn').addEventListener('click', () => {
          openEditModal(card);
        });

        // Delete Modal
        node.querySelector('.deleteBtn').addEventListener('click', () => {
          openConfirmModal('Удалить слово?', `Вы уверены, что хотите удалить "${card.word}"?`, async () => {
            try {
              await fetch(`/api/words/${card.id}/delete/`, {
                method: 'DELETE',
                headers: { 'X-CSRFToken': getCookie('csrftoken') }
              });
              localWords = localWords.filter(x => x.id !== card.id);
              renderCards(localWords);
              showToast('Удалено');
            } catch { }
          });
        });

        const mobileMoveBtn = node.querySelector('.mobileMoveBtn');
        mobileMoveBtn.textContent = isLearned ? '↩ В изучаю' : '✓ Выучил';
        mobileMoveBtn.setAttribute('aria-label', isLearned ? 'Переместить в изучаю' : 'Переместить в выучено');
        mobileMoveBtn.addEventListener('click', async (e) => {
          e.stopPropagation();
          await moveCardToStatus(card, !isLearned);
        });

        setupMobileLongPress(node, card);

        // Drag Start
        node.addEventListener('dragstart', (e) => {
          e.dataTransfer.setData('text/plain', card.id);
          e.dataTransfer.effectAllowed = 'move';
          setTimeout(() => node.classList.add('opacity-50', 'scale-95'), 0);
        });

        node.addEventListener('dragend', () => {
          node.classList.remove('opacity-50', 'scale-95');
        });

        // Append to column
        (isLearned ? learnedCol : unlearnedCol).appendChild(node);
      });
    }

    async function moveCardToStatus(card, isLearnedTarget) {
      if (!card || (card.learned || card.is_learned) === isLearnedTarget) return;

      const previousLearned = card.learned || card.is_learned;
      card.learned = isLearnedTarget;
      card.is_learned = isLearnedTarget;
      renderCards(localWords);

      try {
        await fetch(`/api/words/${card.id}/update/`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
          body: JSON.stringify({ learned: isLearnedTarget })
        });
        showToast(isLearnedTarget ? 'Перемещено в выученные' : 'Перемещено в изучаю');
      } catch {
        card.learned = previousLearned;
        card.is_learned = previousLearned;
        renderCards(localWords);
        showToast('Не удалось переместить');
      }
    }

    function openMoveCardModal(card) {
      const isLearned = card.learned || card.is_learned;
      const html = `
        <div class="space-y-3">
          <p class="text-gray-500 dark:text-gray-400 text-sm">Выберите колонку для этой карточки.</p>
          <button type="button" data-move-target="false"
            class="w-full text-left px-5 py-4 rounded-2xl bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-white font-bold transition-colors ${!isLearned ? 'ring-2 ring-gray-300 dark:ring-gray-600' : 'hover:bg-gray-200 dark:hover:bg-gray-700'}">
            Изучаю
          </button>
          <button type="button" data-move-target="true"
            class="w-full text-left px-5 py-4 rounded-2xl bg-gray-100 dark:bg-gray-800 text-gray-900 dark:text-white font-bold transition-colors ${isLearned ? 'ring-2 ring-gray-300 dark:ring-gray-600' : 'hover:bg-gray-200 dark:hover:bg-gray-700'}">
            Выучено
          </button>
        </div>
      `;

      modalCallback = null;
      const close = showModal('Переместить слово', html, null);
      modalContent.querySelectorAll('[data-move-target]').forEach(btn => {
        btn.addEventListener('click', async () => {
          close();
          await moveCardToStatus(card, btn.dataset.moveTarget === 'true');
        });
      });
    }

    function setupMobileLongPress(node, card) {
      let timer = null;
      let startX = 0;
      let startY = 0;
      let didLongPress = false;

      const isMobile = () => window.matchMedia('(max-width: 767px)').matches;
      const isInteractive = (target) => target.closest('button, input, textarea, select, a');
      const clearTimer = () => {
        if (timer) clearTimeout(timer);
        timer = null;
        node.classList.remove('ring-2', 'ring-indigo-500/50');
      };

      node.addEventListener('pointerdown', (e) => {
        if (!isMobile() || e.pointerType !== 'touch' || isInteractive(e.target)) return;

        startX = e.clientX;
        startY = e.clientY;
        didLongPress = false;
        node.classList.add('ring-2', 'ring-indigo-500/50');

        timer = setTimeout(() => {
          didLongPress = true;
          clearTimer();
          if (navigator.vibrate) navigator.vibrate(30);
          openMoveCardModal(card);
        }, 2000);
      });

      node.addEventListener('pointermove', (e) => {
        if (!timer) return;
        const moved = Math.abs(e.clientX - startX) > 12 || Math.abs(e.clientY - startY) > 12;
        if (moved) clearTimer();
      });

      ['pointerup', 'pointerleave', 'pointercancel'].forEach(eventName => {
        node.addEventListener(eventName, clearTimer);
      });

      node.addEventListener('click', (e) => {
        if (!didLongPress) return;
        e.preventDefault();
        e.stopPropagation();
        didLongPress = false;
      });
    }

    // --- Modal Logic ---
    const modal = document.getElementById('customModal');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalPanel = document.getElementById('modalPanel');
    const modalTitle = document.getElementById('modalTitle');
    const modalContent = document.getElementById('modalContent');
    const modalCancel = document.getElementById('modalCancel');
    const modalConfirm = document.getElementById('modalConfirm');
    let modalCallback = null;

    function showModal(title, htmlContent, onConfirmText = 'ОК') {
      modalTitle.textContent = title;
      modalContent.innerHTML = htmlContent;
      modalConfirm.classList.toggle('hidden', !onConfirmText);
      if (onConfirmText) modalConfirm.textContent = onConfirmText;

      modal.classList.remove('hidden');
      // Animate in
      requestAnimationFrame(() => {
        modalOverlay.classList.remove('opacity-0');
        modalPanel.classList.remove('opacity-0', 'translate-y-full');
      });

      // One-time listeners
      const close = () => {
        modalOverlay.classList.add('opacity-0');
        modalPanel.classList.add('opacity-0', 'translate-y-full');
        setTimeout(() => modal.classList.add('hidden'), 300);
        modalConfirm.onclick = null;
        modalConfirm.classList.remove('hidden');
      };

      modalCancel.onclick = close;
      modalConfirm.onclick = () => {
        if (modalCallback) modalCallback();
        close();
      };

      return close;
    }

    function openConfirmModal(title, text, action) {
      modalCallback = action;
      showModal(title, `<p class="text-gray-600 dark:text-gray-300 text-lg">${text}</p>`, 'Да, удалить');
    }

    function openEditModal(card) {
      const html = `
           <div class="space-y-4">
               <div>
                   <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Слово</label>
                   <input id="editWord" type="text" value="${escapeHtml(card.word)}" class="w-full bg-gray-50 dark:bg-gray-800 rounded-xl px-4 py-3 font-medium outline-none focus:ring-2 focus:ring-gray-900">
               </div>
               <div>
                   <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Перевод</label>
                   <textarea id="editTranslation" rows="3" class="w-full resize-none bg-gray-50 dark:bg-gray-800 rounded-xl px-4 py-3 font-medium outline-none focus:ring-2 focus:ring-gray-900" placeholder="мужчины, люди">${escapeHtml(card.translation || card.ru || '')}</textarea>
               </div>
               <div>
                   <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Пример</label>
                   <input id="editExample" type="text" value="${escapeHtml(card.example || '')}" class="w-full bg-gray-50 dark:bg-gray-800 rounded-xl px-4 py-3 font-medium outline-none focus:ring-2 focus:ring-gray-900">
               </div>
           </div>
        `;

      modalCallback = async () => {
        const newWord = document.getElementById('editWord').value.trim();
        const newTranslation = document.getElementById('editTranslation').value.trim();
        const newEx = document.getElementById('editExample').value.trim();
        if (!newWord) return;

        // Update UI
        card.word = newWord;
        card.translation = newTranslation;
        card.ru = newTranslation;
        card.example = newEx;
        renderCards(localWords);

        // API
        try {
          await fetch(`/api/words/${card.id}/update/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
            body: JSON.stringify({ word: newWord, ru: newTranslation, example: newEx })
          });
        } catch { }
      };

      showModal('Редактировать', html, 'Сохранить');
    }

    // --- Add Word ---
    entryForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const word = wordInput.value.trim();
      if (!word) return;

      const data = {
        word: word,
        ru: ruInput.value.trim(),
        example: exampleInput.value.trim(),
        pos: selectedPosValue, // Use custom value
        category_id: selectedCategoryId
      };

      try {
        const res = await fetch('/api/words/add/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken') },
          body: JSON.stringify(data)
        });
        if (res.ok) {
          const newCard = await res.json();
          // Map API response to local format
          localWords.unshift({
            id: newCard.id,
            word: newCard.word,
            translation: newCard.translation,
            example: data.example,
            pos: newCard.pos,
            learned: false,
            category_id: selectedCategoryId // Add for immediate filtering
          });
          renderCards(localWords);
          entryForm.reset();
          hideWordSuggestions();
          // Reset custom POS
          selectedPosValue = '';
          posLabel.textContent = '— Выбрать —';
          posLabel.classList.add('text-gray-400');
          renderPosOptions();

          showToast('Добавлено');
        }
      } catch { }
    });

    // --- Drop Zones ---
    [unlearnedCol, learnedCol].forEach(zone => {
      zone.addEventListener('dragover', (e) => {
        e.preventDefault();
        zone.classList.remove('border-gray-200', 'dark:border-gray-800');
        zone.classList.add('bg-gray-100', 'dark:bg-gray-800', 'border-gray-400', 'dark:border-gray-500');
      });
      zone.addEventListener('dragleave', (e) => {
        zone.classList.remove('bg-gray-100', 'dark:bg-gray-800', 'border-gray-400', 'dark:border-gray-500');
        zone.classList.add('border-gray-200', 'dark:border-gray-800');
      });
      zone.addEventListener('drop', async (e) => {
        e.preventDefault();
        zone.classList.remove('bg-gray-100', 'dark:bg-gray-800', 'border-gray-400', 'dark:border-gray-500');
        zone.classList.add('border-gray-200', 'dark:border-gray-800');
        const id = parseInt(e.dataTransfer.getData('text/plain'));
        const isLearnedTarget = (zone === learnedCol);

        const card = localWords.find(c => c.id === id);
        await moveCardToStatus(card, isLearnedTarget);
      });
    });

    // Toast Helper
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.innerText = msg;
      t.classList.remove('opacity-0', '-translate-y-4');
      setTimeout(() => t.classList.add('opacity-0', '-translate-y-4'), 2000);
    }

    // Search
    searchInput.addEventListener('input', () => renderCards(localWords));
    quizModeBtn.addEventListener('click', openQuizSession);

    // Dark Mode Toggle
    document.getElementById('darkModeBtn').addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
    });

    // --- Shortcuts ---
    document.addEventListener('keydown', (e) => {
      // Cmd/Ctrl + Enter to Save (Global form submit)
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        e.preventDefault();
        entryForm.requestSubmit();
      }
    });

    // Init
    // --- Form Visibility ---
    const toggleFormBtn = document.getElementById('toggleFormBtn');
    const toggleIcon = document.getElementById('toggleIcon');
    let formVisible = localStorage.getItem('formVisible') !== 'false';

    function renderFormVisibility() {
      if (formVisible) {
        entryForm.classList.remove('hidden');
        if (toggleIcon) toggleIcon.innerHTML = '<polyline points="18 15 12 9 6 15"></polyline>';
      } else {
        entryForm.classList.add('hidden');
        if (toggleIcon) toggleIcon.innerHTML = '<polyline points="6 9 12 15 18 9"></polyline>';
      }
      localStorage.setItem('formVisible', formVisible);
    }

    if (toggleFormBtn) {
      renderFormVisibility();
      toggleFormBtn.addEventListener('click', () => {
        formVisible = !formVisible;
        renderFormVisibility();
      });
    }

    initApp();

    // --- PWA Logic ---
    let deferredPrompt;
    const installBanner = document.getElementById('pwa-install-banner');
    const installButton = document.getElementById('install-button');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (installBanner) {
        installBanner.classList.remove('translate-y-32', 'opacity-0');
      }
    });

    if (installButton) {
      installButton.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          installBanner.classList.add('translate-y-32', 'opacity-0');
        }
        deferredPrompt = null;
      });
    }

    window.addEventListener('appinstalled', () => {
      if (installBanner) {
        installBanner.classList.add('hidden');
      }
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(reg => {
          console.log('SW Registered');
        }).catch(err => {
          console.log('SW registration failed: ', err);
        });
      });
    }
  </script>

  <!-- PWA Install Prompt (Sticky at bottom) -->
  <div id="pwa-install-banner"
    class="fixed bottom-10 w-full flex justify-center px-4 pointer-events-none transition-all duration-700 transform translate-y-32 opacity-0 z-[100]">
    <button id="install-button"
      class="pointer-events-auto bg-gray-900 dark:bg-white text-white dark:text-gray-900 px-7 py-4 rounded-2xl font-bold shadow-2xl flex items-center gap-3 active:scale-95 hover:scale-105 transition-all text-sm sm:text-base border border-gray-700 dark:border-gray-200">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="7 10 12 15 17 10"></polyline>
        <line x1="12" y1="15" x2="12" y2="3"></line>
      </svg>
      Скачать приложение
    </button>
  </div>
</body>
